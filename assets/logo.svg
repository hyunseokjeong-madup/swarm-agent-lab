<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a33"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7ff"/>
      <stop offset="0.5" stop-color="#7c83ff"/>
      <stop offset="1" stop-color="#b072ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="880" height="240" rx="28" fill="url(#bg)"/>

  <!-- swarm mark: nodes converging to a verified core -->
  <g transform="translate(120,120)" stroke="url(#acc)" stroke-width="2.5" fill="none" opacity="0.85">
    <line x1="-70" y1="-55" x2="0" y2="0"/><line x1="70" y1="-55" x2="0" y2="0"/>
    <line x1="-82" y1="6" x2="0" y2="0"/><line x1="82" y1="6" x2="0" y2="0"/>
    <line x1="-46" y1="64" x2="0" y2="0"/><line x1="46" y1="64" x2="0" y2="0"/>
  </g>
  <g transform="translate(120,120)" filter="url(#glow)">
    <circle cx="-70" cy="-55" r="11" fill="#6ee7ff"/>
    <circle cx="70" cy="-55" r="11" fill="#7c83ff"/>
    <circle cx="-82" cy="6" r="11" fill="#7c83ff"/>
    <circle cx="82" cy="6" r="11" fill="#b072ff"/>
    <circle cx="-46" cy="64" r="11" fill="#6ee7ff"/>
    <circle cx="46" cy="64" r="11" fill="#b072ff"/>
    <!-- verified core -->
    <circle cx="0" cy="0" r="26" fill="url(#acc)"/>
    <path d="M-12 1 L-3 11 L13 -10" stroke="#0b1020" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="250" y="112" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="0.5">Swarm Agent Lab</text>
  <text x="252" y="150" font-size="22" font-weight="500" fill="#9fb0d9">evolution-selected · verification-first · never wrong at scale</text>
  <g transform="translate(252,170)">
    <rect x="0" y="0" width="186" height="30" rx="15" fill="#1c2748" stroke="url(#acc)" stroke-width="1.2"/>
    <text x="93" y="20" font-size="14" font-weight="600" fill="#6ee7ff" text-anchor="middle">marketing analytics · 정합성</text>
  </g>
</svg>
